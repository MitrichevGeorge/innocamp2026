<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | GYD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body class="container fullh">
    <div class="centrer">
        <form method="POST" class="loginform">
            <h1>Вход</h1>
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}
            <input type="text" id="email" name="username" class="field" placeholder="Имя пользователя" required autocomplete="username">

            <input type="password" id="password" name="password" class="field" placeholder="Пароль" required autocomplete="current-password">

            <button type="submit" class="field">Войти</button>
            <a href="/register">Зарегистрироваться</a>
        </form>
    </div>
</body>
